baseURL: "https://ethanjinhuang.github.io/"
languageCode: "en-us"
title: "Jin Huang | Zhejiang University"
theme: hugo-profile

caches:
  images:
    dir: :cacheDir/images

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

pagination:
  pagerSize: 3

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
  main:
    - identifier: experience
      name: Experience
      title: Experience
      url: /experience
      weight: 2
    - identifier: award
      name: Award
      title: Award
      url: /awards
      weight: 3
    - identifier: research
      name: Research
      title: Research
      url: /research
      weight: 4
    - identifier: publications
      name: Publications
      title: Publications
      url: /publications
      weight: 5

params:
  title: "Jin Huang's Profile"
  favicon: "/favicon.svg"
  description: "Welcome to my personal profile website!"
  discription: "Welcome to my personal profile website!"
  # Whether the fade animations on the home page will be enabled
  animate: true
  # Whether to add mathjax support on all pages. Alternatively, you can opt-in per page by adding `mathjax: true` in the frontmatter.
  mathjax: true
  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    brandName: "Jin Huang's Profile"
    stickyNavBar:
      enable: true
      showOnScrollUp: false
    menus:
      disableAbout: true
      disableExperience: false
      disableEducation: true
      disableNews: false
      disableResearch: true
      disablePublications: true
      disableAchievements: false
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, I'm"
    title: "Jin Huang (黄 瑾)"
    subtitle: "Ph.D. Candidate"
    content: "From Zhejiang University."
    contact: "From Zhejiang University."
    bottomImage:
      enable: true
    socialLinks:
      fontAwesomeIcons:
        - icon: fas fa-envelope
          url: "mailto:jin.huang@zju.edu.cn"
        - icon: fab fa-researchgate
          url: "https://www.researchgate.net/profile/Jin-Huang-84?ev=hdr_xprf"
        - icon: fab fa-orcid
          url: "https://orcid.org/0000-0003-1309-8329"
        - icon: ai ai-google-scholar
          url: "https://scholar.google.com/citations?hl=en&user=dFbcMfIAAAAJ&view_op=list_works&sortby=pubdate"
        - icon: fab fa-github
          url: "https://github.com/ethan-jin-huang"
        - icon: fab fa-linkedin
          url: "https://www.linkedin.com/in/jinhuang-zju"

  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/profile/profile.jpg"
    content: |-
      I am a Ph.D. candidate supervised by Prof. [Ying Chen](https://person.zju.edu.cn/en/0089096) at Zhejiang University. 
      My research interests include marine robotics, underwater integrated navigation, and acoustic positioning systems.
      I have developed several underwater navigation/positioning systems and algorithms, which have been successfully applied in real-world underwater scenarios, and validated through extensive sea trials.
    # skills:
    #   enable: true
    #   title: "Here are a few technologies I've been working with recently:"
    #   items:
    #     - "HTML"
    #     - "CSS"
    #     - "JavaScript"
    #     - "React"
    #     - "Node"
    #     - "Express"

  # News
  news:
    enable: true
    title: "News"
    # News items are managed in content/news/_index.md

  # LinkedIn Feed
  linkedinFeed:
    enable: true
    provider: "sociablekit"
    title: "LinkedIn Feed"
    profileUrl: "https://www.linkedin.com/in/jinhuang-zju/"
    activityUrl: "https://www.linkedin.com/in/jinhuang-zju/recent-activity/all/"
    badgeVanity: "jinhuang-zju"
    badgeLocale: "en_US"
    # SociableKIT option 1: full JS embed snippet (div + script)
    embedCode: |-
      <div class="sk-ww-linkedin-profile-post" data-embed-id="25660874"></div><script src="https://widgets.sociablekit.com/linkedin-profile-posts/widget.js" defer></script>
    # SociableKIT option 2: iframe URL from widget share/embed settings
    iframeUrl: ""

  # Education
  education:
    enable: true
    title: "Education"
    # Education list page data is maintained in content/experience/*.md (section: education).

  # Experience (for /experience page)
  # `enable` controls homepage section only.
  experience:
    enable: false
    title: "Experience"
    # Experience list page data is maintained in content/experience/*.md (section: experience).

  # Research
  research:
    enable: true
    title: "Research"

  # Publications
  publications:
    enable: true
    title: "Publications"
    # Publications are managed as Markdown files under content/publications/*.md
